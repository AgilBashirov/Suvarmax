<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşlər — Admin — Suvarmax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2d8659',
                        'primary-dark': '#1f5d3f',
                        'primary-light': '#e8f5e9',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="font-sans antialiased bg-gray-50 min-h-screen flex flex-col">
    <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-wrap items-center justify-between gap-3">
            <div class="flex items-center gap-3 flex-wrap">
                <a href="../index.html" class="flex items-center shrink-0" title="Sayta qayıt">
                    <img src="../assets/images/logo.svg" alt="Suvarmax" class="h-12 md:h-20 w-auto object-contain">
                </a>
                <span class="text-gray-300 hidden sm:inline">|</span>
                <a href="panel.html" class="text-sm text-gray-600 hover:text-primary">← Admin əsas</a>
            </div>
            <div class="flex items-center gap-3 text-sm">
                <span id="admin-user" class="text-gray-600"></span>
                <button type="button" id="btn-logout" class="text-gray-600 hover:text-gray-900">Çıxış</button>
            </div>
        </div>
        <nav class="border-t border-gray-100 bg-gray-50/80">
            <div class="container mx-auto px-4 py-2 flex flex-wrap gap-1">
                <a href="panel.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-200/80">Əsas</a>
                <a href="panel-works.html" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-primary-light text-primary" aria-current="page">İşlər</a>
                <a href="panel-partners.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-200/80">Partnyorlar</a>
                <a href="panel-contact.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-200/80">Əlaqə və sosial</a>
                <a href="panel-home.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-200/80">Xidmət və Haqqımızda</a>
                <a href="panel-telegram.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-200/80">Telegram</a>
                <a href="panel-admins.html" class="px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-200/80">İstifadəçilər</a>
            </div>
        </nav>
    </header>

    <main class="flex-1 container mx-auto px-4 py-8 max-w-5xl">
        <section>
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
                <h1 class="text-lg font-semibold text-gray-800">İşlər</h1>
                <button type="button" id="btn-new-work" class="bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-primary-dark shrink-0">
                    Yeni iş
                </button>
            </div>

            <div id="works-loading" class="hidden bg-white rounded-xl shadow border border-gray-100 p-8 text-center text-sm text-gray-500 mb-6">
                Yüklənir…
            </div>

            <div id="works-empty" class="hidden bg-white rounded-xl shadow border border-gray-100 p-10 text-center text-gray-600 mb-6">
                <p class="font-medium text-gray-800 mb-1">Hələ iş yoxdur</p>
                <p class="text-sm mb-4">«Yeni iş» ilə birinci layihəni əlavə edin.</p>
                <a href="panel-works-edit.html" class="inline-block bg-primary text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-primary-dark">Yeni iş əlavə et</a>
            </div>

            <div id="works-table-wrap" class="bg-white rounded-xl shadow border border-gray-100 overflow-hidden hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 text-gray-600 border-b border-gray-200">
                            <tr>
                                <th class="px-3 py-3 font-medium w-16" scope="col"></th>
                                <th class="px-4 py-3 font-medium" scope="col">ID</th>
                                <th class="px-4 py-3 font-medium" scope="col">Başlıq</th>
                                <th class="px-4 py-3 font-medium" scope="col">Dillər</th>
                                <th class="px-4 py-3 font-medium" scope="col">Şəkil</th>
                                <th class="px-4 py-3 font-medium w-44" scope="col">Əməliyyat</th>
                            </tr>
                        </thead>
                        <tbody id="works-table-body"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="admin-common.js"></script>
    <script src="admin-works-shared.js"></script>
    <script src="admin-works.js"></script>
</body>
</html>
