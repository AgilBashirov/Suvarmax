<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../assets/images/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="../assets/images/favicon.png">
    <title>Admin girişi — Suvarmax</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2d8659',
                        'primary-dark': '#1f5d3f',
                        'primary-light': '#e8f5e9',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">
    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="../index.html#home" class="flex items-center">
                    <img src="../assets/images/logo.svg" alt="Suvarmax Logo" class="h-12 md:h-20 w-auto object-contain">
                </a>
                <button id="mobile-menu-btn" class="md:hidden text-gray-700 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <div id="mobile-menu" class="hidden md:flex md:items-center md:space-x-6">
                    <a href="../index.html#home" class="text-primary font-medium hover:text-primary-dark transition text-lg">Ana Səhifə</a>
                    <a href="../index.html#about" class="text-gray-700 hover:text-primary transition text-lg">Haqqımızda</a>
                    <a href="../index.html#services" class="text-gray-700 hover:text-primary transition text-lg">Xidmətlər</a>
                    <a href="../index.html#partners" class="text-gray-700 hover:text-primary transition text-lg">Partnyorlar</a>
                    <a href="../works.html" class="text-gray-700 hover:text-primary transition text-lg">İşlərimiz</a>
                    <a href="../index.html#contact" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary-dark transition text-lg font-semibold">Əlaqə</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex-1 flex items-center justify-center bg-gray-100 px-4 py-8">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8 border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-800 text-center mb-2">Admin panel</h1>
        <p class="text-sm text-gray-500 text-center mb-8">İstifadəçi adı və şifrə (data/site-data.json)</p>
        <form id="login-form" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">İstifadəçi adı</label>
                <input type="text" id="username" name="username" required autocomplete="username"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Şifrə</label>
                <input type="password" id="password" name="password" required autocomplete="current-password"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none">
            </div>
            <p id="login-error" class="text-sm text-red-600 hidden"></p>
            <button type="submit" class="w-full bg-primary text-white py-3 rounded-lg font-semibold hover:bg-primary-dark transition">
                Daxil ol
            </button>
        </form>
        <p class="mt-6 text-center">
            <a href="../index.html#home" class="text-sm text-primary hover:text-primary-dark">Sayta qayıt</a>
        </p>
    </div>
    </div>
    <script src="../assets/js/main.js"></script>
    <script src="admin-login.js"></script>
</body>
</html>
